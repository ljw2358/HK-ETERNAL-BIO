<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK-QUANTUMBIO | 불멸의 삶을 실현하다</title>
    <style>
        :root {
            --neon-green: #00ff95;
            --bg-dark: #000805;
            --glass: rgba(0, 255, 149, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Pretendard', -apple-system, sans-serif;
            overflow-x: hidden;
            line-height: 1.8;
        }

        /* 바이오 테크 배경 효과 */
        .bio-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #001a11 0%, #000805 100%);
            z-index: -1;
        }

        /* 오른쪽 상단 네모난 언어 선택 박스 */
        .lang-container {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 1000;
        }

        .lang-box {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 8px 18px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 255, 149, 0.2);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lang-box:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 25px var(--neon-green);
        }

        .lang-list {
            position: absolute;
            top: 105%;
            right: 0;
            background: rgba(0, 8, 5, 0.95);
            border: 1px solid var(--neon-green);
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            padding: 10px;
            width: 260px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }

        .lang-btn {
            background: var(--glass);
            border: 1px solid rgba(0, 255, 149, 0.1);
            color: var(--neon-green);
            padding: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .lang-btn:hover, .lang-btn.active {
            background: var(--neon-green);
            color: #000;
        }

        /* 메인 콘텐츠 레이아웃 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 140px 20px 80px;
            text-align: center;
        }

        .brand {
            font-size: clamp(3rem, 12vw, 7.5rem);
            font-weight: 900;
            color: var(--neon-green);
            text-shadow: 0 0 30px rgba(0, 255, 149, 0.4);
            margin: 0;
            letter-spacing: -2px;
            animation: breathe 4s infinite alternate;
        }

        .slogan-main {
            font-size: clamp(1.1rem, 3vw, 2rem);
            font-weight: 200;
            color: #e0e0e0;
            margin-top: 30px;
            margin-bottom: 70px;
            letter-spacing: 3px;
            word-break: keep-all;
        }

        /* 내용 충실히 (카드 배치) */
        .content-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            text-align: left;
            margin-top: 50px;
        }

        .bio-card {
            background: rgba(255, 255, 255, 0.02);
            border-left: 4px solid var(--neon-green);
            padding: 40px;
            transition: 0.4s;
        }

        .bio-card:hover {
            background: rgba(0, 255, 149, 0.05);
            transform: translateX(10px);
        }

        .bio-card h3 {
            color: var(--neon-green);
            font-size: 1.6rem;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .bio-card p {
            font-size: 1.05rem;
            color: #ccc;
            margin: 0;
        }

        /* 푸터 */
        .footer {
            margin-top: 100px;
            border-top: 1px solid rgba(0, 255, 149, 0.1);
            padding: 50px 0;
        }

        .success-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neon-green);
            letter-spacing: 5px;
            margin-bottom: 25px;
        }

        .mail {
            color: rgba(255,255,255,0.3);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .mail:hover { color: var(--neon-green); }

        @keyframes breathe {
            from { opacity: 0.8; transform: scale(1); }
            to { opacity: 1; transform: scale(1.02); }
        }

        @media (max-width: 768px) {
            .lang-list { width: 100vw; right: -25px; grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

    <div class="bio-bg"></div>

    <div class="lang-container">
        <div class="lang-box" onclick="toggleLang()">
            LANGUAGE <span id="arrow">▼</span>
        </div>
        <div id="lang-list" class="lang-list">
            <button class="lang-btn active" onclick="change('ko', this)">한국어</button>
            <button class="lang-btn" onclick="change('en', this)">English</button>
            <button class="lang-btn" onclick="change('zh', this)">Chinese</button>
            <button class="lang-btn" onclick="change('ar', this)">Arabic</button>
            <button class="lang-btn" onclick="change('hi', this)">Hindi</button>
            <button class="lang-btn" onclick="change('es', this)">Spanish</button>
            <button class="lang-btn" onclick="change('pt', this)">Brazil</button>
            <button class="lang-btn" onclick="change('uk', this)">Ukraine</button>
            <button class="lang-btn" onclick="change('ja', this)">Japanese</button>
            <button class="lang-btn" onclick="change('ru', this)">Russian</button>
        </div>
    </div>

    <div class="container">
        <h1 class="brand">HK-QUANTUMBIO</h1>
        <p id="slogan" class="slogan-main">"인류의 노화 정복과 불멸의 삶을 실현하다"</p>

        <div class="content-section">
            <div class="bio-card">
                <h3 id="h1">초정밀 유전자 편집</h3>
                <p id="p1">퀀텀 컴퓨팅 기술을 결합한 독자적인 유전자 교정 솔루션으로 질병의 근원을 제거하고 신체 능력을 극대화합니다.</p>
            </div>
            <div class="bio-card">
                <h3 id="h2">나노 로봇 재생 의학</h3>
                <p id="p2">혈관 내에서 작동하는 초미세 나노 로봇을 통해 손상된 세포를 실시간으로 복구하고 노화 시계를 되돌립니다.</p>
            </div>
        </div>

        <footer class="footer">
            <div id="target" class="success-text">고객의 성공을 위하여</div>
            <a href="mailto:info@quantumbio.com" class="mail">info@quantumbio.com</a>
        </footer>
    </div>

    <script>
        const db = {
            'ko': {
                s: '"인류의 노화 정복과 불멸의 삶을 실현하다"', t: '고객의 성공을 위하여',
                h1: '초정밀 유전자 편집', p1: '퀀텀 컴퓨팅 기술을 결합한 독자적인 유전자 교정 솔루션으로 질병의 근원을 제거하고 신체 능력을 극대화합니다.',
                h2: '나노 로봇 재생 의학', p2: '혈관 내에서 작동하는 초미세 나노 로봇을 통해 손상된 세포를 실시간으로 복구하고 노화 시계를 되돌립니다.'
            },
            'en': {
                s: '"CONQUERING AGING, REALIZING IMMORTALITY"', t: 'FOR CUSTOMER SUCCESS',
                h1: 'Quantum Gene Editing', p1: 'Removing the roots of disease and maximizing human potential through quantum-integrated gene correction.',
                h2: 'Nano-Robot Regeneration', p2: 'Real-time repair of damaged cells and reversal of the aging clock via intravascular nano-robotics.'
            }
            // 형님, 나머지 언어들도 이 포맷으로 추가하시면 됩니다!
        };

        function toggleLang() {
            const list = document.getElementById('lang-list');
            const arrow = document.getElementById('arrow');
            const isOpen = list.style.display === 'grid';
            list.style.display = isOpen ? 'none' : 'grid';
            arrow.innerText = isOpen ? '▼' : '▲';
        }

        function change(lang, btn) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const data = db[lang] || db['en'];
            document.getElementById('slogan').innerText = data.s;
            document.getElementById('target').innerText = data.t;
            document.getElementById('h1').innerText = data.h1;
            document.getElementById('p1').innerText = data.p1;
            document.getElementById('h2').innerText = data.h2;
            document.getElementById('p2').innerText = data.p2;
            
            toggleLang();
        }
    </script>
</body>
</html>
